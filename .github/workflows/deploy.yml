name: deploy

on:
  workflow_run:
    workflows: ['tests']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Public repos on Docker Hub's free tier — no per-month registry cost.
      # Nothing secret is baked into the image (real secrets come from .env at
      # container start), so public visibility only exposes compiled source code,
      # not credentials. Switch to a private registry (e.g. Azure Container
      # Registry, ~$5/mo) instead if you'd rather not publish the image publicly.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # VITE_REVERB_APP_KEY must equal REVERB_APP_KEY in the server's runtime .env
      # (it's the public Pusher-protocol app key, not the secret — safe as a
      # repo variable). Set these four under Settings > Secrets and variables >
      # Actions > Variables before the first deploy.
      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: app
          push: true
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app
          build-args: |
            VITE_APP_NAME=${{ vars.VITE_APP_NAME }}
            VITE_REVERB_APP_KEY=${{ vars.REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ vars.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=${{ vars.VITE_REVERB_PORT }}
            VITE_REVERB_SCHEME=${{ vars.VITE_REVERB_SCHEME }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zeno-app:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/zeno-app:latest

      - name: Build & push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: web
          push: true
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            VITE_APP_NAME=${{ vars.VITE_APP_NAME }}
            VITE_REVERB_APP_KEY=${{ vars.REVERB_APP_KEY }}
            VITE_REVERB_HOST=${{ vars.VITE_REVERB_HOST }}
            VITE_REVERB_PORT=${{ vars.VITE_REVERB_PORT }}
            VITE_REVERB_SCHEME=${{ vars.VITE_REVERB_SCHEME }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/zeno-web:${{ steps.tag.outputs.tag }}
            ${{ secrets.DOCKERHUB_USERNAME }}/zeno-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v6

      - name: Copy compose/proxy config to Azure VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: 'docker-compose.prod.yml,Caddyfile'
          target: '/opt/zeno'

      - name: Pull, migrate, and restart services
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USERNAME }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            set -e
            cd /opt/zeno
            export REGISTRY_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/zeno
            export IMAGE_TAG=${{ needs.build-and-push.outputs.image_tag }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --wait mysql
            docker compose -f docker-compose.prod.yml run --rm app php artisan migrate --force
            docker compose -f docker-compose.prod.yml up -d --wait --remove-orphans
            docker image prune -af --filter "until=72h"
