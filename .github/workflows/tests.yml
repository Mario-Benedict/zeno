name: tests

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version: ['8.4', '8.5']

    services:
      # MongoDB is required by the LlmChat feature (messages collection).
      # Tests connect via MONGODB_URI (configured in phpunit.xml).
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ ping: 1 }).ok' | grep -q 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: mongodb
          tools: composer:v2
          coverage: xdebug

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Node Dependencies
        run: npm i

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Configure MongoDB for CI
        run: |
          sed -i 's|^MONGODB_URI=.*|MONGODB_URI=mongodb://127.0.0.1:27017|' .env
          echo "MONGODB_DATABASE=zeno_test" >> .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Clean install
        run: npm ci
      - name: Build Assets
        run: npm run build

      - name: Tests
        run: ./vendor/bin/pest
