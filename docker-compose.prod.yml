services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    command: --innodb-buffer-pool-size=256M --max-connections=50
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks: [backend]
    labels:
      com.datadoghq.ad.logs: '[{"source": "mysql", "service": "zeno-mysql"}]'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      interval: 5s
      timeout: 5s
      retries: 10
      # First-ever boot (creating the data dir, zeno database, and users) is much
      # slower than a warm restart, especially with all 8 containers on this VM
      # pulling/starting at once and competing for 2 vCPUs. Failures during this
      # window don't count against the retry budget below.
      start_period: 60s

  # Daily local mysqldump, 7-day retention. Copy /var/lib/docker/volumes/<project>_mysql_backups
  # off-box periodically (e.g. rclone to Cloudflare R2) for real disaster recovery -
  # this alone only protects against bad migrations/accidental deletes, not VM/disk loss.
  db-backup:
    image: mysql:8.4
    restart: unless-stopped
    entrypoint: ['/bin/sh', '-c']
    command:
      - |
        while true; do
          mysqldump -h mysql -u root -p"$$MYSQL_ROOT_PASSWORD" --all-databases | gzip > "/backups/backup-$$(date +%Y%m%d-%H%M%S).sql.gz"
          find /backups -name '*.sql.gz' -mtime +7 -delete
          sleep 86400
        done
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql_backups:/backups
    networks: [backend]
    depends_on:
      mysql:
        condition: service_healthy

  # Every service below carries a com.datadoghq.ad.logs label so the
  # datadog-agent's Docker Autodiscovery (DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL
  # below) can tag each container's logs with the right "source" instead of
  # shipping everything generically. Without this, Datadog has no pipeline to
  # parse app/php's JSON (LOG_CHANNEL=stderr, see config/logging.php) or
  # web/nginx's access log, and falls back to flagging every line by which
  # stream (stdout/stderr) it arrived on — which is why healthy 200/303
  # responses were showing up marked as errors.
  app:
    image: ${REGISTRY_IMAGE}-app:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    networks: [backend]
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', "php -r \"exit(@fsockopen('127.0.0.1', 9000) ? 0 : 1);\""]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 20s
    labels:
      com.datadoghq.ad.logs: '[{"source": "php", "service": "zeno-app"}]'

  web:
    image: ${REGISTRY_IMAGE}-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost/up']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    networks: [backend]
    labels:
      com.datadoghq.ad.logs: '[{"source": "nginx", "service": "zeno-web"}]'

  reverb:
    image: ${REGISTRY_IMAGE}-app:${IMAGE_TAG:-latest}
    command: ['php', 'artisan', 'reverb:start', '--host=0.0.0.0', '--port=8080']
    restart: unless-stopped
    env_file: .env
    networks: [backend]
    labels:
      com.datadoghq.ad.logs: '[{"source": "php", "service": "zeno-reverb"}]'

  queue:
    image: ${REGISTRY_IMAGE}-app:${IMAGE_TAG:-latest}
    command: ['php', 'artisan', 'queue:work', '--tries=1', '--sleep=3', '--max-time=3600']
    restart: unless-stopped
    env_file: .env
    networks: [backend]
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      com.datadoghq.ad.logs: '[{"source": "php", "service": "zeno-queue"}]'

  scheduler:
    image: ${REGISTRY_IMAGE}-app:${IMAGE_TAG:-latest}
    command: ['php', 'artisan', 'schedule:work']
    restart: unless-stopped
    env_file: .env
    networks: [backend]
    depends_on:
      mysql:
        condition: service_healthy
    labels:
      com.datadoghq.ad.logs: '[{"source": "php", "service": "zeno-scheduler"}]'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    env_file: .env
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [backend]
    labels:
      com.datadoghq.ad.logs: '[{"source": "caddy", "service": "zeno-caddy"}]'

  # Collects every other container's stdout/stderr (Laravel logs JSON there,
  # see LOG_CHANNEL=stderr) and ships it to Datadog. Without a DD_API_KEY set,
  # this container fails to start and idles in Docker's restart backoff -
  # harmless to the rest of the stack, just not collecting anything. Adds real
  # RAM/CPU overhead on top of the app stack - worth watching on a small VM.
  datadog-agent:
    image: gcr.io/datadoghq/agent:7
    restart: unless-stopped
    environment:
      DD_API_KEY: ${DD_API_KEY}
      DD_SITE: ${DD_SITE:-datadoghq.com}
      DD_LOGS_ENABLED: 'true'
      DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL: 'true'
      DD_CONTAINER_EXCLUDE: 'name:datadog-agent'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
    networks: [backend]

networks:
  backend:

volumes:
  mysql_data:
  mysql_backups:
  caddy_data:
  caddy_config:
