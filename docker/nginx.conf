server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # The UI/Laravel enforce feature-specific limits up to 50 MB. Keep enough
    # multipart headroom so validation can return designed errors instead of
    # Nginx replacing the application response with its plain 413 page.
    client_max_body_size 60m;

    add_header X-Content-Type-Options "nosniff" always;

    # Container-local readiness endpoint. Keep this independent from PHP-FPM:
    # Compose already waits for the app healthcheck before starting Nginx, and
    # coupling both checks made a transient FastCGI failure mark Nginx itself
    # unhealthy and abort the entire deployment.
    location = /nginx-health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_connect_timeout 10;
        fastcgi_send_timeout 60;
        fastcgi_read_timeout 300;
        # Prevent an otherwise valid Laravel/Inertia response with larger
        # headers from being surfaced as "upstream sent too big header" / 502.
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 64k;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
}
