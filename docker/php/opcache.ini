opcache.enable=1
opcache.enable_cli=0
opcache.memory_consumption=192
opcache.interned_strings_buffer=16
opcache.max_accelerated_files=20000
opcache.validate_timestamps=0
opcache.save_comments=1

; JIT (tracing mode, opcache.jit=1255) disabled: this app is I/O-bound (DB
; queries, HTTP calls to Reverb/Gemini/R2/MongoDB), not compute-heavy, so
; JIT's benefit here is marginal - but PHP's tracing JIT combined with native
; extensions (this image loads mongodb, gd, curl, pcntl) is a documented
; source of hard worker crashes (segfaults) that skip PHP's own error
; handling entirely and show up only as a bare "502 Bad Gateway" with zero
; trace in any log. Given that exact symptom is what we're trying to fix
; here, trading a marginal CPU win for that crash risk isn't worth it.
opcache.jit=0
opcache.jit_buffer_size=0
