[www]
user = www-data
group = www-data
listen = 9000

pm = dynamic
pm.max_children = 6
pm.start_servers = 2
pm.min_spare_servers = 1
pm.max_spare_servers = 3
pm.max_requests = 500

; Without these, a worker that dies mid-request (PHP fatal error, segfault,
; memory exhaustion) leaves zero trace anywhere - not in Laravel's logs (the
; process never got far enough to run the exception handler), not in
; `docker logs`, nothing. The proxy in front (Caddy/nginx) just sees the
; FastCGI connection drop and reports a bare 502 Bad Gateway, with no way to
; tell what actually happened. catch_workers_output surfaces that worker's
; own stdout/stderr (php-fpm normally swallows it) so the real cause - e.g.
; an "Allowed memory size exhausted" fatal - shows up in the container logs
; (and therefore Datadog) instead of vanishing.
catch_workers_output = yes
decorate_workers_output = no
php_admin_value[error_log] = /proc/self/fd/2
php_admin_flag[log_errors] = on

; No php.ini is copied into the image (see docker/Dockerfile), so PHP falls
; back to its compiled-in default of 128M/30s. That's tight for an
; Inertia-heavy page (HandleInertiaRequests shares a fair amount of data per
; request: project navigation, chat previews, notifications) and easy to
; blow through under normal use rather than only under abuse, taking the
; whole worker down with it (see catch_workers_output above for why that's
; otherwise invisible). Bumped, not unbounded, so a genuinely runaway request
; still gets killed instead of holding a worker forever.
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 60
